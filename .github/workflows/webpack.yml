name: SPFx Build and Package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 20.x]
      # 即使某个版本失败，继续运行其他版本
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Verify heft installation
      run: npx heft --version

    - name: Build SPFx solution
      run: npx heft build --production

    - name: Package SPFx solution
      run: npx heft package-solution --production

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: spfx-package-node-${{ matrix.node-version }}
        path: sharepoint/solution/*.sppkg
